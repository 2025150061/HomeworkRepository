<!DOCTYPE html>

<html>
    <head>
        <meta charset = "utf-8">
        <title>Login</title>
        <link rel = "stylesheet" type = "text/css" href = "main.css">
    <body>
        <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
        <p>
            <a href = "login.html">로그인&nbsp;</a><a href = "signup.html">|&nbsp;회원가입</a>
        </p>
        <div>
            <form method = "GET" autocomplete = "on" action = "https://www.example.com">
                <p>
                    <label class = "shiftleft">아이디:</label>
                    <input class = "input-box" type  = "text" name = "id" placeholder = "아이디 입력" required>
                </p>
                <p>
                    <label class = "shiftleft">비밀번호:</label> 
                    <input class = "input-box" type  = "password" name = "password" placeholder = "비밀번호 입력" required>
                </p>
                <p class = "gotoleft">
                    <input class = "signup" type = "submit" value = "Login">
                    <input class = "cancel" type = "reset" value = "Cancel">
                </p>
            </form>
        </div>
    </body>

</html>
