<!DOCTYPE html>

<html>
    <head>
        <meta charset = "utf-8">
        <title>Lab 2</title>
        <link rel = "stylesheet" type = "text/css" href = "main.css">
    </head>

    <body>
        <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
        <p>
            <a href = "login.html">로그인&nbsp;</a><a href = "signup.html">|&nbsp;회원가입</a>  
        </p>
        <div>
            <form method = "GET" action = "https://www.example.com">
                <p>
                    <label class = "shiftleft">이름:</label> 
                    <input class = "input-box" type  = "text" name = "name" autofocus>
                </p>
                <p>
                    <label class = "shiftleft">생일:</label>
                        <input class = "input-box" type = "date" name = "date">
                </p>
                <p>
                    <label class = "shiftleft">성별:</label>
                    <input type="radio" name="gender" value="male">
                    <label class = "gap">남성</label>
                        
                    <input type="radio" name="gender" value="female">
                    <label>여성</label>
                </p>
                <p>
                    <label class = "shiftleft">학년:</label>
                        <input class = "input-box" name = "grade" type = "number" min = "1" max = "4" step = "1">
                </p>
                <p>
                    <label class = "shiftleft">아이디:</label> 
                    <input class = "input-box" type  = "text" name = "id" required>
                </p>
                <p>
                    <label class = "shiftleft">비밀번호:</label> 
                    <input class = "input-box" type  = "password" name = "password" required>
                </p>
                <p>
                    <label class = "shiftleft">이메일:</label> 
                    <input class = "input-box" type  = "email" name = "email" placeholder = "name@example.com">
                </p>
                <p>
                    <label class = "shiftleft">보안 질문:</label>
                        <select class = "input-box" name = "security">
                            <option selected>질문을 선택하세요</option>
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    
                </p>
                <p>
                    <label class = "shiftleft">답변:</label> 
                    <input class = "input-box" type  = "text" name = "answer" autocomplete = "on">
                </p>
                
                <p class = "gotoleft">
                    <input class = "signup" type = "submit" value = "Signup">
                    <input class = "cancel" type = "reset" value = "Cancel">
                </p>
            </form>
        </div>
    </body>
</html>
