<!-- html 선언부 -->
<!-- <>는 angle brackets -->
<!-- =로 속성 추가 -->
<!DOCTYPE html>  
<!-- 최상위 elements-->
<html>
    <!-- head element(출력 안 됨)-->
    <head>
        <meta charset = "utf-8">
        <!-- title element는 head의 child element-->
        <title>Headings</title>
    </head>
    <!-- body element(실제로 출력됨)-->
    <body>
        <!-- h1 ~ h6는 제목을 나타내는 heading element-->
        <h1>Level 1 Heading</h1>
        <h2>Level 2 Heading</h2>
        <h3>Level 3 Heading</h3>
        <h4>Level 4 Heading</h4>
        <h5>Level 5 Heading</h5>
        <h6>Level 6 Heading</h6>
    </body>

</html>
